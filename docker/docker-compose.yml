services:
  postgres:
    image: postgres:17-alpine
    container_name: vpb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vpb
      POSTGRES_PASSWORD: vpb_local_dev
      POSTGRES_DB: vpb
    ports:
      - "5432:5432"
    volumes:
      - vpb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpb -d vpb"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vpb_pgdata:
